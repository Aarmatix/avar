# Release workflow for the AVAR reference verifier.
#
# Triggered by pushing a tag matching `v*` (e.g. v0.1.1).
# Builds native standalone binaries on macos-15 (darwin-arm64),
# macos-15-intel (darwin-x64), ubuntu-latest (linux-x64), and
# ubuntu-24.04-arm (linux-arm64), runs the AVAR conformance suite
# against each COMPILED binary (not the JS build), packages tarballs,
# generates a readable source bundle on Linux, produces SHA256SUMS +
# release-manifest.json, attests every distributable artifact
# individually via actions/attest-build-provenance, publishes a
# GitHub Release, and opens an automated formula-update PR against
# Aarmatix/homebrew-tap.
#
# Gates (all must pass or the release job fails):
#   G1 Conformance suite green against compiled binary
#   G2 Correct exit codes on every vector
#   G3 Native execution confirmed (uname -m matches artifact arch)
#   G4 No undeclared network egress during verify
#   G5 Startup+verify within per-target budget on a 10KB receipt
#   G6 Archive contents match an explicit allowlist
#   G7 Clean install/uninstall verified in the tap smoke test (post-release)
#   G8 `gh attestation verify` succeeds against every artifact

name: release

on:
  push:
    tags:
      - "v*"
      - "@avar-standard/core@*"
      - "@avar-standard/verify@*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and gate, but do not publish release or open tap PR"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write        # required by attest-build-provenance
  attestations: write

env:
  ARTIFACT_ALLOWLIST: "avar LICENSE NOTICE README.md"

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      is_binary: ${{ steps.p.outputs.is_binary }}
      is_pkg: ${{ steps.p.outputs.is_pkg }}
      pkg_dir: ${{ steps.p.outputs.pkg_dir }}
    steps:
      - id: p
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" == v* ]]; then
            echo "is_binary=true" >> "$GITHUB_OUTPUT"
            echo "is_pkg=false"   >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == @avar-standard/core@* ]]; then
            echo "is_binary=false" >> "$GITHUB_OUTPUT"
            echo "is_pkg=true"     >> "$GITHUB_OUTPUT"
            echo "pkg_dir=core"    >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == @avar-standard/verify@* ]]; then
            echo "is_binary=false" >> "$GITHUB_OUTPUT"
            echo "is_pkg=true"     >> "$GITHUB_OUTPUT"
            echo "pkg_dir=verify"  >> "$GITHUB_OUTPUT"
          else
            echo "is_binary=false" >> "$GITHUB_OUTPUT"
            echo "is_pkg=false"    >> "$GITHUB_OUTPUT"
          fi
  binary:
    needs: parse
    if: needs.parse.outputs.is_binary == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-15
            os: macos
            target: bun-darwin-arm64
            artifact: darwin-arm64
            expected_uname: arm64
            startup_budget_ms: 500
          - runner: macos-15-intel
            os: macos
            target: bun-darwin-x64
            artifact: darwin-x64
            expected_uname: x86_64
            startup_budget_ms: 800
          - runner: ubuntu-latest
            os: linux
            target: bun-linux-x64
            artifact: linux-x64
            expected_uname: x86_64
            startup_budget_ms: 800
          - runner: ubuntu-24.04-arm
            os: linux
            target: bun-linux-arm64
            artifact: linux-arm64
            expected_uname: aarch64
            startup_budget_ms: 800
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="0.0.0-dev.$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.1.34" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install deps and build JS (for library consumers)
        run: |
          npm install --no-audit --no-fund --package-lock=false
          npm run build

      - name: Compile standalone binary (native only, no cross-compile)
        run: |
          bun build bin/avar.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define AVAR_VERSION='"${{ steps.ver.outputs.version }}"' \
            --outfile avar
          file avar
          ls -lh avar

      # ---- G3: native execution ----
      - name: G3 native execution
        run: |
          UN=$(uname -m)
          echo "runner uname -m: $UN"
          test "$UN" = "${{ matrix.expected_uname }}"
          ./avar --version

      # ---- G1 + G2: conformance parity + exit codes ----
      - name: Fetch conformance suite
        uses: actions/checkout@v4
        with:
          repository: Aarmatix/avar-conformance
          path: conformance

      - name: G1 + G2 conformance and exit codes
        run: |
          set -euo pipefail
          bash conformance/scripts/run-suite.sh ./avar

      # ---- G4: no undeclared network ----
      - name: G4 network isolation (macos)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          VEC=$(find conformance/vectors -name '*.json' | head -1)
          ./avar verify "$VEC" >/tmp/verify.out &
          PID=$!
          sleep 0.05
          if /usr/sbin/lsof -a -p "$PID" -i -nP 2>/dev/null | \
               grep -E 'ESTABLISHED|SYN_SENT' ; then
            echo "G4 FAIL: verifier opened a network connection"
            kill "$PID" 2>/dev/null || true
            exit 1
          fi
          wait "$PID"

      - name: G4 network isolation (linux)
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq lsof
          VEC=$(find conformance/vectors -name '*.json' | head -1)
          ./avar verify "$VEC" >/tmp/verify.out &
          PID=$!
          sleep 0.05
          if lsof -a -p "$PID" -i -nP 2>/dev/null | \
               grep -E 'ESTABLISHED|SYN_SENT' ; then
            echo "G4 FAIL: verifier opened a network connection"
            kill "$PID" 2>/dev/null || true
            exit 1
          fi
          wait "$PID"

      # ---- G5: performance budget ----
      - name: G5 startup+verify budget
        run: |
          set -euo pipefail
          VEC=$(find conformance/vectors -name '*.json' | head -1)
          MIN=999999
          for i in 1 2 3; do
            T=$(python3 -c "import time,subprocess; s=time.time(); subprocess.run(['./avar','verify','$VEC'],stdout=subprocess.DEVNULL); print(int((time.time()-s)*1000))")
            [ "$T" -lt "$MIN" ] && MIN=$T
          done
          echo "min startup+verify: ${MIN}ms (budget ${{ matrix.startup_budget_ms }}ms)"
          test "$MIN" -lt "${{ matrix.startup_budget_ms }}"

      # ---- G6: archive allowlist ----
      - name: G6 package tarball with allowlisted contents
        id: pkg
        run: |
          set -euo pipefail
          STAGE="avar-v${{ steps.ver.outputs.version }}-${{ matrix.artifact }}"
          mkdir "$STAGE"
          cp avar LICENSE NOTICE README.md "$STAGE/"
          ACTUAL=$(cd "$STAGE" && ls -1 | sort | tr '\n' ' ')
          EXPECTED=$(echo "$ARTIFACT_ALLOWLIST" | tr ' ' '\n' | sort | tr '\n' ' ')
          echo "archive contents: $ACTUAL"
          echo "expected        : $EXPECTED"
          test "$ACTUAL" = "$EXPECTED"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256" 2>/dev/null || \
            sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          echo "archive=$STAGE.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256
          if-no-files-found: error

  source-bundle:
    needs: parse
    if: needs.parse.outputs.is_binary == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="0.0.0-dev.$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.1.34" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install --no-audit --no-fund --package-lock=false
      - name: Build readable JS bundle
        run: |
          set -euo pipefail
          bun build bin/avar.ts \
            --target=node \
            --define AVAR_VERSION='"${{ steps.ver.outputs.version }}"' \
            --outfile avar.bundle.js
      - name: Stage source bundle
        id: pkg
        run: |
          set -euo pipefail
          STAGE="avar-v${{ steps.ver.outputs.version }}-source-bundle"
          mkdir "$STAGE"
          cp avar.bundle.js LICENSE NOTICE README.md CLEAN-ROOM.md "$STAGE/"
          cp package.json package-lock.json "$STAGE/" 2>/dev/null || true
          cat > "$STAGE/avar" <<'LAUNCH'
          #!/usr/bin/env node
          import(new URL("./avar.bundle.js", import.meta.url));
          LAUNCH
          chmod +x "$STAGE/avar"
          cat > "$STAGE/build-metadata.json" <<META
          {
            "artifact_kind": "source-bundle",
            "version": "${{ steps.ver.outputs.version }}",
            "source_commit": "${GITHUB_SHA}",
            "workflow_run": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "builder": {
              "runner_image": "ubuntu-latest",
              "bun": "1.1.34",
              "node": "20"
            }
          }
          META
          tar -czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          echo "archive=$STAGE.tar.gz" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: source-bundle
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256

  release:
    needs: [parse, binary, source-bundle]
    if: ${{needs.parse.outputs.kind=='binary'}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="0.0.0-dev.$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }

      - name: Assemble SHA256SUMS
        working-directory: dist
        run: |
          set -euo pipefail
          rm -f SHA256SUMS
          for f in *.tar.gz; do
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Build release-manifest.json
        working-directory: dist
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python3 <<'PY'
          import hashlib, json, os, pathlib
          version = os.environ["VERSION"]
          PLATFORMS = ["darwin-arm64", "darwin-x64", "linux-x64", "linux-arm64", "source-bundle"]
          out = {
              "version": version,
              "source_commit": os.environ["GITHUB_SHA"],
              "workflow_run": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "builder": {"bun": "1.1.34", "node": "20"},
              "artifacts": [],
          }
          for p in sorted(pathlib.Path(".").glob("*.tar.gz")):
              b = p.read_bytes()
              plat = next((x for x in PLATFORMS if x in p.name), "unknown")
              out["artifacts"].append({
                  "name": p.name,
                  "platform": plat,
                  "sha256": hashlib.sha256(b).hexdigest(),
                  "size_bytes": len(b),
                  "attestation_verify": f"gh attestation verify {p.name} --repo Aarmatix/avar",
              })
          pathlib.Path("release-manifest.json").write_text(
              json.dumps(out, indent=2) + "\n"
          )
          print(json.dumps(out, indent=2))
          PY

      - name: Attest all distributables
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release-manifest.json

      - name: Verify attestations locally (G8)
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for f in *.tar.gz SHA256SUMS release-manifest.json; do
            echo "== attestation: $f =="
            gh attestation verify "$f" --repo "${GITHUB_REPOSITORY}"
          done

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release-manifest.json
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            AVAR reference verifier ${{ steps.ver.outputs.version }}.

            Every artifact in this release is covered by an individual
            GitHub build-provenance attestation. Verify with:

                gh attestation verify <file> --repo Aarmatix/avar

            Platforms: darwin-arm64, darwin-x64, linux-x64, linux-arm64,
            plus a readable source bundle. See `release-manifest.json` for
            per-artifact SHA256, platform, and verification command.

  tap-pr:
    needs: [parse, release]
    if: ${{ needs.parse.outputs.kind == 'binary' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - name: Open formula-update PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DARM=$(sha256sum "dist/avar-v${VERSION}-darwin-arm64.tar.gz" | awk '{print $1}')
          DX64=$(sha256sum "dist/avar-v${VERSION}-darwin-x64.tar.gz" | awk '{print $1}')
          LARM=$(sha256sum "dist/avar-v${VERSION}-linux-arm64.tar.gz" | awk '{print $1}')
          LX64=$(sha256sum "dist/avar-v${VERSION}-linux-x64.tar.gz" | awk '{print $1}')
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Aarmatix/homebrew-tap.git" tap
          cd tap
          git config user.name  "aarmos-release-bot"
          git config user.email "release-bot@aarmos.io"
          BR="avar/v${VERSION}"
          git checkout -b "$BR"
          mkdir -p Formula
          cat > Formula/avar.rb <<RB
          class Avar < Formula
            desc "AVAR reference verifier — standalone, provenance-attested"
            homepage "https://github.com/Aarmatix/avar"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/Aarmatix/avar/releases/download/v${VERSION}/avar-v${VERSION}-darwin-arm64.tar.gz"
                sha256 "${DARM}"
              end
              on_intel do
                url "https://github.com/Aarmatix/avar/releases/download/v${VERSION}/avar-v${VERSION}-darwin-x64.tar.gz"
                sha256 "${DX64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/Aarmatix/avar/releases/download/v${VERSION}/avar-v${VERSION}-linux-arm64.tar.gz"
                sha256 "${LARM}"
              end
              on_intel do
                url "https://github.com/Aarmatix/avar/releases/download/v${VERSION}/avar-v${VERSION}-linux-x64.tar.gz"
                sha256 "${LX64}"
              end
            end

            def install
              bin.install "avar"
              prefix.install "LICENSE", "NOTICE", "README.md"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/avar --version").strip
            end
          end
          RB
          git add Formula/avar.rb
          git commit -m "avar ${VERSION}"
          git push -u origin "$BR"
          gh pr create \
            --repo Aarmatix/homebrew-tap \
            --title "avar ${VERSION}" \
            --body "Automated update from Aarmatix/avar release v${VERSION}. Provenance attestations attached; verify with \`gh attestation verify\`. Now covers darwin-arm64/x64 and linux-arm64/x64."
  npm-publish:
    needs: parse
    if: needs.parse.outputs.is_pkg == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install --no-audit --no-fund --package-lock=false
      - run: npm run build --workspace packages/${{ needs.parse.outputs.pkg_dir }}
      - run: npm test    --workspace packages/${{ needs.parse.outputs.pkg_dir }}
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AVAR_STANDARD_TOKEN }}
        run: npm publish --workspace packages/${{ needs.parse.outputs.pkg_dir }} --provenance --access public
